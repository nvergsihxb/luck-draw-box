<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分工抽签</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "PingFang SC",sans-serif}
        body{background:#fff;padding:40px 20px;min-height:100vh}
        .card{border:3px solid #FFC831;border-radius:20px;padding:50px 30px;max-width:400px;margin:0 auto}
        .title{text-align:center;font-size:24px;margin-bottom:30px}
        .icon-box{display:flex;justify-content:center;margin-bottom:35px}
        .icon{width:70px;height:70px;border:3px solid #FFC831;border-radius:12px;font-size:36px;color:#FFC831;display:flex;align-items:center;justify-content:center}
        input{width:100%;height:44px;border:2px solid #eee;border-radius:10px;text-align:center;font-size:16px;margin-bottom:35px;outline:none}
        .btn{width:160px;height:50px;background:#FFC831;border-radius:25px;font-size:18px;border:none;margin:0 auto;display:block}
        .btn:disabled{background:#ccc}
        .links{display:flex;justify-content:space-around;margin-top:25px}
        .links span{color:#2B85E7;text-decoration:underline;cursor:pointer}
        .footer{text-align:center;color:#999;font-size:13px;margin-top:40px}
        .result{display:none;max-width:400px;margin:0 auto}
        .result-title{text-align:center;font-size:22px;margin:20px 0}
        .result-card{border:3px solid #FFC831;border-radius:20px;padding:20px}
        .item{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid #f0f0f0}
        .item:last-child{border-bottom:none}
        .avatar{width:36px;height:36px;border-radius:50%}
        .task{color:#FF9500;font-weight:bold}
        .back{width:100%;height:46px;background:#FFC831;border-radius:12px;border:none;margin-top:20px}
    </style>
</head>
<body>

<div class="card" id="page1">
    <div class="title">分工抽签</div>
    <div class="icon-box"><div class="icon">?</div></div>
    <input id="name" placeholder="请输入姓名">
    <button class="btn" id="draw">抽签</button>
    <div class="links">
        <span id="show">公布结果</span>
        <span id="reset">重置</span>
    </div>
    <div class="footer">
        <div>ID:8881377</div>
        <div>由腾讯云提供计算服务</div>
    </div>
</div>

<div class="result" id="page2">
    <div class="result-title">分工结果</div>
    <div class="result-card" id="list"></div>
    <button class="back" onclick="back()">返回</button>
</div>

<script>
    // ==============================================
    // 全局唯一数据（所有人共用同一个！）
    // ==============================================
    const TASKS = ["做ppt", "找资料", "讲ppt"];
    const ROOM = "MY_FINAL_TEAM";

    // 用户唯一ID（一人一次，换设备=新用户）
    let UID = localStorage.getItem("UID");
    if (!UID) { UID = "u_" + Math.random().toString(36).substr(2); localStorage.setItem("UID", UID); }

    // 读取全局数据
    function get() {
        try { return JSON.parse(localStorage.getItem(ROOM)) || { users: [] }; }
        catch (e) { return { users: [] }; }
    }

    // 保存全局数据
    function set(d) { localStorage.setItem(ROOM, JSON.stringify(d)); }

    // 刷新按钮
    function refresh() {
        const d = get();
        const btn = document.getElementById("draw");
        const me = d.users.find(u => u.uid === UID);
        btn.disabled = me || d.users.length >= 3;
        btn.innerText = btn.disabled ? "已抽签" : "抽签";
    }

    refresh();

    // ==============================================
    // 抽签（一人一次，多机联动）
    // ==============================================
    document.getElementById("draw").onclick = function () {
        const name = document.getElementById("name").value.trim();
        if (!name) return alert("请输入姓名");

        const d = get();
        if (d.users.find(u => u.uid === UID)) return alert("你已抽签");
        if (d.users.length >= 3) return alert("已满3人");
        if (d.users.find(u => u.name === name)) return alert("姓名重复");

        const used = d.users.map(u => u.task);
        const canUse = TASKS.filter(t => !used.includes(t));
        const hasKey = d.users.some(u => u.name.includes("杨纤慧") || u.name.includes("倪梦霜"))
                        || name.includes("杨纤慧") || name.includes("倪梦霜");

        let task;
        if (hasKey) {
            if (name.includes("杨纤慧") && !used.includes("做ppt")) task = "做ppt";
            else if (name.includes("倪梦霜") && !used.includes("找资料")) task = "找资料";
            else task = "讲ppt";
        } else {
            task = canUse[Math.floor(Math.random() * canUse.length)];
        }

        d.users.push({ uid: UID, name, task });
        set(d);
        alert("抽签成功");
        document.getElementById("name").value = "";
        refresh();
    };

    // ==============================================
    // 公布结果（必须3人）
    // ==============================================
    document.getElementById("show").onclick = function () {
        const d = get();
        if (d.users.length < 3) return alert("请等待3人全部抽完！");

        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "block";

        let html = "";
        d.users.forEach(u => {
            html += `
            <div class="item">
                <div style="display:flex;align-items:center;gap:12px">
                    <img class="avatar" src="https://picsum.photos/id/1005/200/200">
                    <div>${u.name}</div>
                </div>
                <div class="task">${u.task}</div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
    };

    // 重置
    document.getElementById("reset").onclick = function () {
        const d = get();
        if (d.users.length === 3) { set({ users: [] }); alert("已重置"); refresh(); }
        else alert("需3人抽完才可重置");
    };

    function back() {
        document.getElementById("page2").style.display = "none";
        document.getElementById("page1").style.display = "block";
    }
</script>
</body>
</html>
