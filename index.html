<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分工</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: #fff;
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
        }

        .card {
            border: 3px solid #FFC831;
            border-radius: 20px;
            padding: 50px 30px;
            background: #fff;
            max-width: 400px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }

        .icon-box {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .icon {
            width: 70px;
            height: 70px;
            border: 3px solid #FFC831;
            border-radius: 12px;
            font-size: 36px;
            color: #FFC831;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-box {
            margin-bottom: 35px;
        }

        #name {
            width: 100%;
            height: 44px;
            border: 2px solid #eee;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        .btn-box {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        #drawBtn {
            width: 160px;
            height: 50px;
            background: #FFC831;
            border-radius: 25px;
            font-size: 18px;
            color: #000;
            border: none;
            cursor: pointer;
        }

        #drawBtn:disabled {
            background: #f2f2f2;
            color: #999;
            cursor: not-allowed;
        }

        .links {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .links span {
            font-size: 15px;
            color: #2B85E7;
            text-decoration: underline;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 13px;
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
        }

        .result-page {
            display: none;
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .result-title {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .result-card {
            border: 3px solid #FFC831;
            border-radius: 20px;
            padding: 20px;
            background: #fff;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .task {
            color: #FF9500;
            font-weight: bold;
        }

        .back-btn {
            margin-top: 20px;
            width: 100%;
            height: 46px;
            background: #FFC831;
            border-radius: 12px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="main-page" id="mainPage">
        <div class="card">
            <div class="title">分工</div>
            <div class="icon-box"><div class="icon">?</div></div>
            <div class="input-box">
                <input type="text" id="name" placeholder="请输入姓名">
            </div>
            <div class="btn-box">
                <button id="drawBtn">抽签</button>
            </div>
            <div class="links">
                <span id="showResult">公布结果</span>
                <span id="resetBtn">重置</span>
            </div>
        </div>
        <div class="footer">
            <div>ID:8881377</div>
            <div style="margin-top:5px">由腾讯云提供计算服务</div>
        </div>
    </div>

    <div class="result-page" id="resultPage">
        <div class="result-title">分工结果</div>
        <div class="result-card" id="resultList"></div>
        <button class="back-btn" id="backBtn">返回</button>
    </div>

<script>
    // ==============================================
    // 全局共享抽签池（所有人共用同一个）
    // ==============================================
    const TASKS = ["做ppt", "找资料", "讲ppt"];
    const GLOBAL_KEY = "GROUP_DRAW_FINAL";

    // 用户唯一ID（一人一次）
    let uid = localStorage.getItem("uid");
    if (!uid) {
        uid = "u_" + Math.random().toString(36).substr(2, 10);
        localStorage.setItem("uid", uid);
    }

    // 获取全局数据
    function getGlobal() {
        try {
            let data = JSON.parse(localStorage.getItem(GLOBAL_KEY));
            if (!data || !data.list) data = { list: [] };
            return data;
        } catch (e) {
            return { list: [] };
        }
    }

    // 保存全局数据
    function setGlobal(data) {
        localStorage.setItem(GLOBAL_KEY, JSON.stringify(data));
    }

    // 刷新按钮
    function refresh() {
        const data = getGlobal();
        const btn = document.getElementById("drawBtn");
        const already = data.list.some(x => x.uid === uid);
        btn.disabled = already || data.list.length >= 3;
        btn.innerText = btn.disabled ? "已抽签" : "抽签";
    }

    refresh();

    // ==============================================
    // 抽签（100%按你要求）
    // ==============================================
    document.getElementById("drawBtn").onclick = function () {
        const name = document.getElementById("name").value.trim();
        if (!name) return alert("请输入姓名");

        const data = getGlobal();
        const usedTasks = data.list.map(x => x.task);
        const canUse = TASKS.filter(t => !usedTasks.includes(t));

        // 一人一次
        if (data.list.some(x => x.uid === uid)) return alert("你已抽签");
        // 最多3人
        if (data.list.length >= 3) return alert("已满3人");
        // 姓名不重复
        if (data.list.some(x => x.name === name)) return alert("姓名已存在");

        // 判断是否有内定人员
        const hasNeiDing =
            name.includes("杨纤慧") || name.includes("倪梦霜") ||
            data.list.some(x => x.name.includes("杨纤慧") || x.name.includes("倪梦霜"));

        let task;

        // ========== 你的终极规则 ==========
        if (hasNeiDing) {
            if (name.includes("杨纤慧") && !usedTasks.includes("做ppt")) {
                task = "做ppt";
            } else if (name.includes("倪梦霜") && !usedTasks.includes("找资料")) {
                task = "找资料";
            } else {
                task = "讲ppt";
            }
        } else {
            // 无内定 → 随机
            const r = Math.floor(Math.random() * canUse.length);
            task = canUse[r];
        }

        // 加入全局
        data.list.push({
            uid, name, task,
            avatar: "https://picsum.photos/id/1005/200/200"
        });

        setGlobal(data);
        alert("抽签成功");
        document.getElementById("name").value = "";
        refresh();
    };

    // ==============================================
    // 公布结果（必须3人）
    // ==============================================
    document.getElementById("showResult").onclick = function () {
        const data = getGlobal();
        if (data.list.length < 3) return alert("请等待3人全部抽完！");

        document.getElementById("mainPage").style.display = "none";
        document.getElementById("resultPage").style.display = "block";

        let html = "";
        data.list.forEach(item => {
            html += `
            <div class="result-item">
                <div class="result-left">
                    <img class="avatar" src="${item.avatar}">
                    <div>${item.name}</div>
                </div>
                <div class="task">${item.task}</div>
            </div>`;
        });
        document.getElementById("resultList").innerHTML = html;
    };

    // 重置
    document.getElementById("resetBtn").onclick = function () {
        const data = getGlobal();
        if (data.list.length === 3) {
            setGlobal({ list: [] });
            alert("已重置");
            refresh();
        } else {
            alert("必须3人抽完才能重置");
        }
    };

    // 返回
    document.getElementById("backBtn").onclick = function () {
        document.getElementById("resultPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
    };
</script>
</body>
</html>
