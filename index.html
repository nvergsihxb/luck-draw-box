<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分工</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: #fff;
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
        }

        .card {
            border: 3px solid #FFC831;
            border-radius: 20px;
            padding: 50px 30px;
            background: #fff;
            max-width: 400px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }

        .icon-box {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .icon {
            width: 70px;
            height: 70px;
            border: 3px solid #FFC831;
            border-radius: 12px;
            font-size: 36px;
            color: #FFC831;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-box {
            margin-bottom: 35px;
        }

        #name {
            width: 100%;
            height: 44px;
            border: 2px solid #eee;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        .btn-box {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        #joinBtn {
            width: 160px;
            height: 50px;
            background: #FFC831;
            border-radius: 25px;
            font-size: 18px;
            color: #000;
            border: none;
            cursor: pointer;
        }

        #joinBtn:disabled {
            background: #f2f2f2;
            color: #999;
        }

        .links {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .links span {
            font-size: 15px;
            color: #2B85E7;
            text-decoration: underline;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 13px;
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
        }

        .result-page {
            display: none;
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .result-title {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .result-card {
            border: 3px solid #FFC831;
            border-radius: 20px;
            padding: 20px;
            background: #fff;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .task {
            color: #FF9500;
            font-weight: bold;
        }

        .back-btn {
            margin-top: 20px;
            width: 100%;
            height: 46px;
            background: #FFC831;
            border-radius: 12px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="main-page" id="mainPage">
        <div class="card">
            <div class="title">分工</div>
            <div class="icon-box"><div class="icon">?</div></div>
            <div class="input-box">
                <input type="text" id="name" placeholder="请输入姓名加入">
            </div>
            <div class="btn-box">
                <button id="joinBtn">加入分组</button>
            </div>
            <div class="links">
                <span id="showResult">公布结果</span>
                <span id="resetBtn">重置</span>
            </div>
        </div>
        <div class="footer">
            <div>ID:8881377</div>
            <div>由腾讯云提供计算服务</div>
        </div>
    </div>

    <div class="result-page" id="resultPage">
        <div class="result-title">分工结果</div>
        <div class="result-card" id="resultList"></div>
        <button class="back-btn" id="backBtn">返回</button>
    </div>

<script>
    // 全局唯一任务
    const ALL_TASKS = ["做ppt", "找资料", "讲ppt"];
    const GLOBAL_DATA = "GROUP_FINAL_DATA";

    // 一人一次
    let uid = localStorage.getItem("uid");
    if (!uid) {
        uid = "u_" + Math.random().toString(36).substr(2,10);
        localStorage.setItem("uid", uid);
    }

    // 读取全局
    function getGlobal() {
        try {
            return JSON.parse(localStorage.getItem(GLOBAL_DATA)) || { users: [] };
        } catch (e) {
            return { users: [] };
        }
    }

    // 保存全局
    function setGlobal(data) {
        localStorage.setItem(GLOBAL_DATA, JSON.stringify(data));
    }

    // 刷新按钮
    function refresh() {
        const g = getGlobal();
        const btn = document.getElementById("joinBtn");
        const already = g.users.some(u => u.uid === uid);
        btn.disabled = already || g.users.length >= 3;
        btn.innerText = already ? "已加入" : "加入分组";
    }

    refresh();

    // ======================
    // 加入（系统自动分配）
    // ======================
    document.getElementById("joinBtn").onclick = function () {
        const name = document.getElementById("name").value.trim();
        if (!name) return alert("请输入姓名");

        const g = getGlobal();
        if (g.users.some(u => u.uid === uid)) return alert("已加入");
        if (g.users.length >= 3) return alert("已满3人");
        if (g.users.some(u => u.name === name)) return alert("姓名重复");

        // 加入名单
        g.users.push({ uid, name });
        setGlobal(g);

        // 满3人 → 系统自动分配任务
        if (g.users.length === 3) {
            autoAssignTasks();
        }

        alert("加入成功");
        document.getElementById("name").value = "";
        refresh();
    };

    // ======================
    // 系统自动分配（核心！）
    // ======================
    function autoAssignTasks() {
        const g = getGlobal();
        const users = g.users;
        const tasks = [...ALL_TASKS];

        // 内定人员
        let yang = users.find(u => u.name.includes("杨纤慧"));
        let ni = users.find(u => u.name.includes("倪梦霜"));
        let other = users.filter(u => !u.name.includes("杨纤慧") && !u.name.includes("倪梦霜"));

        // 有内定 → 强制分配
        if (yang || ni) {
            if (yang) { yang.task = "做ppt"; tasks.splice(tasks.indexOf("做ppt"), 1); }
            if (ni) { ni.task = "找资料"; tasks.splice(tasks.indexOf("找资料"), 1); }
            if (other.length > 0) { other[0].task = "讲ppt"; }
        } 
        // 无内定 → 随机分配
        else {
            users.forEach(u => {
                const r = Math.floor(Math.random() * tasks.length);
                u.task = tasks[r];
                tasks.splice(r, 1);
            });
        }

        setGlobal(g);
    }

    // ======================
    // 公布结果（必须3人）
    // ======================
    document.getElementById("showResult").onclick = function () {
        const g = getGlobal();
        if (g.users.length < 3) return alert("请等待3人全部加入");

        document.getElementById("mainPage").style.display = "none";
        document.getElementById("resultPage").style.display = "block";

        let html = "";
        g.users.forEach(u => {
            html += `
            <div class="result-item">
                <div class="result-left">
                    <img class="avatar" src="https://picsum.photos/id/1005/200/200">
                    <div>${u.name}</div>
                </div>
                <div class="task">${u.task}</div>
            </div>`;
        });
        document.getElementById("resultList").innerHTML = html;
    };

    // 重置
    document.getElementById("resetBtn").onclick = function () {
        const g = getGlobal();
        if (g.users.length === 3) {
            setGlobal({ users: [] });
            alert("已重置");
            refresh();
        } else {
            alert("必须3人加入完成");
        }
    };

    // 返回
    document.getElementById("backBtn").onclick = function () {
        document.getElementById("resultPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
    };
</script>
</body>
</html>
